version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vista-postgres
    environment:
      POSTGRES_USER: vista
      POSTGRES_PASSWORD: vista
      POSTGRES_DB: vista_authen
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vista -d vista_authen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vista-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vista-api
    environment:
      DATABASE_URL: postgresql+asyncpg://vista:vista@postgres:5432/vista_authen
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-production
      JWT_ALGORITHM: HS256
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  nginx:
    image: nginx:alpine
    container_name: vista-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data: